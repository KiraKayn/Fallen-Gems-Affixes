    runtimeOnly fg.deobf("curse.maven:additional-attributes-986624:6531414")
    runtimeOnly fg.deobf("curse.maven:runiclib-880879:6628573")

    runtimeOnly fg.deobf("curse.maven:lendercataclysm-551586:6769185")

    implementation fg.deobf("curse.maven:scorched-guns-802940:7201155")


    runtimeOnly fg.deobf("curse.maven:apotheotic-additions-924640:6393313")
    runtimeOnly fg.deobf("curse.maven:esoteric-reforging-forge-1150370:5989440")

    runtimeOnly fg.deobf("curse.maven:to-tweaks-irons-spells-1046916:6322784")
    runtimeOnly fg.deobf("curse.maven:cataclysm-spellbooks-1099461:6769871")
    runtimeOnly fg.deobf("curse.maven:alshanexs-familiars-1171602:6250904")
