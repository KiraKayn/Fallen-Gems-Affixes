mixin {
    if (project.mixin.toBoolean()) {
        config "${modid}.mixins.json"
        add sourceSets.main, "${modid}.refmap.json"
    }
}

tasks.named('processResources', ProcessResources).configure {
    def replaceProperties = [
            modGroup    : modGroup,
            modid       : modid,
            version     : version,
            modName     : modName,
            author      : author,
            desc        : desc,
            mcVersion   : mc_version,
            javaVersion : javaVersion,
            forgeVersion: forge_version
    ]

    inputs.properties replaceProperties

    def resourceTargets = [
            'META-INF/mods.toml',
            'pack.mcmeta'
    ]

    filesMatching(resourceTargets) {
        expand replaceProperties
    }

    filesMatching('mixins.json') {
        def mixinFiles = []
        def clientMixinFiles = []

        def path = "${project.projectDir}/src/main/java/${modGroup}/${modid}/mixin".replaceAll('\\.', '/')
        fileTree(path).visit { FileVisitDetails details ->
            def name = details.file.path.replace('\\', '/')
            name = name.substring(name.indexOf('mixin/') + 'mixin/'.length(), name.length())
            if (name.endsWith('.java')) {
                name = name.substring(0, name.length() - '.java'.length())
                if (name.startsWith('client')) {
                    clientMixinFiles.add(name)
                } else {
                    mixinFiles.add(name)
                }
            }
        }

        def mixins = ''
        def clientMixins = ''

        for (int i = 0; i < mixinFiles.size(); i++) {
            def name = mixinFiles[i]
            name = name.replaceAll('\\/', '.')
            mixins += '        "' + name + '"'
            if (i != mixinFiles.size() - 1) {
                mixins += ',\n'
            }
        }

        for (int i = 0; i < clientMixinFiles.size(); i++) {
            def name = clientMixinFiles[i]
            name = name.replaceAll('\\/', '.')
            clientMixins += '        "' + name + '"'
            if (i != clientMixinFiles.size() - 1) {
                clientMixins += ',\n'
            }
        }

        replaceProperties.put('mixins', mixins)
        replaceProperties.put('clientMixins', clientMixins)

        expand replaceProperties
        name "${modid}.mixins.json".toString()
    }
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                "Specification-Title"     : project.fileName,
                "Specification-Vendor"    : project.author,
                "Specification-Version"   : "1.0", // We are version 1 of ourselves
                "Implementation-Title"    : project.fileName,
                "Implementation-Version"  : project.version,
                "Implementation-Vendor"   : project.author,
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                "MixinConfigs"            : project.mixin.toBoolean() ? "${modid}.mixins.json" : ""
        ])
    }

    finalizedBy 'reobfJar'
}

tasks.register('generateUpdateJson') {
    def inputFile = file(".github/update_template.json")
    def outputFile = file("update.json")

    inputs.file(inputFile)
    outputs.file(outputFile)

    doLast {
        def modVersion = project.version.toString()
        def mcVersion = mc_version
        def map = [
                "{{MCVERSION}}": mcVersion,
                "{{VERSION}}"  : modVersion
        ]
        def content = inputFile.getText("UTF-8")
                .replace(map)

        outputFile.parentFile.mkdirs()
        outputFile.write(content, "UTF-8")
        println "Generated update.json with ${mcVersion}-${modVersion}"
    }
}

// auto processing before build
tasks.named("processResources").configure {
    dependsOn tasks.named("generateUpdateJson")
}

java {
    withSourcesJar()
}

tasks.withType(GenerateModuleMetadata) {
    enabled = false
}

tasks.jarJar.configure {
    archiveClassifier = ""
    dependsOn('reobfJar')
}

reobf {
    jarJar {}
}

jar.finalizedBy('reobfJarJar')

modrinth {
    token = System.getenv("MODRINTH_TOKEN")
    projectId = "apotheosis-ascended"
    versionNumber = "${version}"
    versionType = "release"
    versionName = "Apotheosis Ascended ${rootProject.version}+${mc_version}"
    changelog = new File("$project.rootDir/CHANGELOG.md").getText('UTF-8')
    uploadFile = jar
    gameVersions = forge_game_versions.split(", ").toList()
    loaders = forge_mod_loaders.split(", ").collect { return it.toLowerCase(Locale.ROOT) }
    dependencies {
        required.project("additional-attributes")
        required.project("runiclib")
        // required.project("apotheosis")
        // not uploaded to modrinth
    }
}


task publishCurseForge(type: net.darkhax.curseforgegradle.TaskPublishCurseForge) {
    group = 'publishing'
    apiToken = System.getenv("CF_TOKEN")
    def mainFile = upload(1144178, jar)
    mainFile.displayName = "Apotheosis Ascended ${rootProject.version}+${mc_version}"
    mainFile.releaseType = "release"
    mainFile.changelog = new File("$project.rootDir/CHANGELOG.md").getText('UTF-8')
    mainFile.changelogType = "markdown"
    forge_mod_loaders.split(", ").each {
        mainFile.addModLoader(it)
    }
    mainFile.addGameVersion("1.20.1")

    mainFile.addRequirement("apotheosis")
    mainFile.addRequirement("additional-attributes")
    mainFile.addRequirement("runiclib")
}

task publishAll {
    dependsOn('publishCurseForge')
    dependsOn('modrinth')
    group = 'publishing'

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs.removeAll(["-Werror"])
        options.compilerArgs += ["-Xlint:deprecation"]
    }
}
